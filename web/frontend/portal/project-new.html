<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Project | Company Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div x-data="newProjectApp()" x-init="init()">

        <!-- Header -->
        <header class="bg-white shadow-sm">
            <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/portal/projects.html" class="text-blue-600 hover:underline text-sm">← Back to Projects</a>
                    <h1 class="text-lg font-semibold text-gray-800">New Project</h1>
                </div>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <span x-text="user.display_name"></span>
                    <button @click="logout()" class="text-red-600 hover:underline">Logout</button>
                </div>
            </div>
        </header>

        <!-- Loading -->
        <div x-show="loading" class="text-center mt-20 text-gray-500">Loading…</div>

        <!-- Form -->
        <main x-show="!loading" class="max-w-3xl mx-auto px-6 py-10">

            <div class="bg-white rounded-xl border border-gray-200 p-8">

                <h2 class="text-xl font-semibold text-gray-800 mb-6">Project Details</h2>

                <form @submit.prevent="createProject()">

                    <!-- Required Fields -->
                    <div class="space-y-5 mb-6">

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                Project Number <span class="text-red-500">*</span>
                            </label>
                            <input type="text" x-model="form.project_number" @blur="checkDuplicate()" required
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="e.g. 12345" />
                            <p x-show="duplicateError" x-text="duplicateError" class="mt-1 text-xs text-red-600"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                Project Name <span class="text-red-500">*</span>
                            </label>
                            <input type="text" x-model="form.project_name" required
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="e.g. I-90 Bridge Replacement" />
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                Site Address <span class="text-red-500">*</span>
                            </label>
                            <textarea x-model="form.site_address" required rows="2"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Enter full site address"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                Timezone <span class="text-red-500">*</span>
                            </label>
                            <select x-model="form.timezone" required
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="America/Chicago">America/Chicago (Central)</option>
                                <option value="America/New_York">America/New_York (Eastern)</option>
                                <option value="America/Denver">America/Denver (Mountain)</option>
                                <option value="America/Los_Angeles">America/Los_Angeles (Pacific)</option>
                                <option value="America/Phoenix">America/Phoenix (Arizona)</option>
                                <option value="America/Anchorage">America/Anchorage (Alaska)</option>
                                <option value="Pacific/Honolulu">Pacific/Honolulu (Hawaii)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                Rain Station Code <span class="text-red-500">*</span>
                            </label>
                            <input type="text" x-model="form.rain_station_code" required
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="e.g. MEDF" />
                            <p class="mt-1 text-xs text-gray-500">
                                Oklahoma Mesonet station code for rainfall data.
                                <a href="https://www.mesonet.org/index.php/site/sites/class/all" target="_blank"
                                    class="text-blue-600 hover:underline">View station map</a>
                            </p>
                        </div>

                    </div>

                    <!-- Optional Fields (Collapsible) -->
                    <div class="border-t border-gray-200 pt-6 mb-6">
                        <button type="button" @click="showOptional = !showOptional"
                            class="flex items-center gap-2 text-sm font-medium text-gray-700 hover:text-gray-900">
                            <svg class="w-4 h-4 transition-transform" :class="{ 'rotate-90': showOptional }" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5l7 7-7 7" />
                            </svg>
                            <span>Additional Details (Optional)</span>
                        </button>

                        <div x-show="showOptional" x-transition class="mt-5 space-y-5">

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Start Date</label>
                                    <input type="date" x-model="form.start_date"
                                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1.5">End Date</label>
                                    <input type="date" x-model="form.end_date"
                                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">RE/ODOT Contact 1</label>
                                <input type="text" x-model="form.re_odot_contact_1"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Name, title, phone" />
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">RE/ODOT Contact 2</label>
                                <input type="text" x-model="form.re_odot_contact_2"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Name, title, phone" />
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Contractor Name</label>
                                <input type="text" x-model="form.contractor_name"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Contractor company name" />
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Contract ID</label>
                                <input type="text" x-model="form.contract_id"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Contract identifier" />
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Notes</label>
                                <textarea x-model="form.notes" rows="3"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Additional project notes"></textarea>
                            </div>

                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="flex items-center justify-end gap-3 pt-6 border-t border-gray-200">
                        <a href="/portal/projects.html"
                            class="px-6 py-2.5 text-sm font-medium text-gray-700 hover:text-gray-900">
                            Cancel
                        </a>
                        <button type="submit" :disabled="submitting || duplicateError"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-show="!submitting">Create Project</span>
                            <span x-show="submitting">Creating…</span>
                        </button>
                    </div>

                    <p x-show="error" x-text="error" class="mt-4 text-sm text-red-600"></p>

                </form>

            </div>

        </main>
    </div>

    <script>
        function newProjectApp() {
            return {
                loading: true,
                submitting: false,
                showOptional: false,
                error: '',
                duplicateError: '',
                user: { display_name: '', company_id: '' },
                form: {
                    project_number: '',
                    project_name: '',
                    site_address: '',
                    timezone: 'America/Chicago',
                    rain_station_code: '',
                    start_date: '',
                    end_date: '',
                    re_odot_contact_1: '',
                    re_odot_contact_2: '',
                    contractor_name: '',
                    contract_id: '',
                    notes: ''
                },

                async init() {
                    try {
                        const meRes = await fetch('/auth/me', { credentials: 'same-origin' });
                        if (!meRes.ok) {
                            window.location.href = '/auth/login';
                            return;
                        }
                        this.user = await meRes.json();
                    } catch (err) {
                        console.error('Error loading user:', err);
                        this.error = 'Failed to load user data';
                    } finally {
                        this.loading = false;
                    }
                },

                async checkDuplicate() {
                    if (!this.form.project_number) {
                        this.duplicateError = '';
                        return;
                    }

                    const companyId = this.user.company_id || this.extractCompanyFromMemberships();
                    if (!companyId) return;

                    try {
                        const res = await fetch(
                            `/auth/companies/${companyId}/projects?number=${encodeURIComponent(this.form.project_number)}`,
                            { credentials: 'same-origin' }
                        );

                        if (res.ok) {
                            const data = await res.json();
                            if (data.projects && data.projects.length > 0) {
                                this.duplicateError = 'A project with this number already exists';
                            } else {
                                this.duplicateError = '';
                            }
                        }
                    } catch (err) {
                        console.error('Duplicate check failed:', err);
                    }
                },

                async createProject() {
                    this.error = '';
                    this.submitting = true;

                    const companyId = this.user.company_id || this.extractCompanyFromMemberships();
                    if (!companyId) {
                        this.error = 'No company membership found';
                        this.submitting = false;
                        return;
                    }

                    try {
                        // Build request payload (exclude empty optionals)
                        const payload = {
                            project_number: this.form.project_number,
                            project_name: this.form.project_name,
                            site_address: this.form.site_address,
                            timezone: this.form.timezone,
                            rain_station_code: this.form.rain_station_code
                        };

                        // Add optional fields only if filled
                        if (this.form.start_date) payload.start_date = this.form.start_date;
                        if (this.form.end_date) payload.end_date = this.form.end_date;
                        if (this.form.re_odot_contact_1) payload.re_odot_contact_1 = this.form.re_odot_contact_1;
                        if (this.form.re_odot_contact_2) payload.re_odot_contact_2 = this.form.re_odot_contact_2;
                        if (this.form.contractor_name) payload.contractor_name = this.form.contractor_name;
                        if (this.form.contract_id) payload.contract_id = this.form.contract_id;
                        if (this.form.notes) payload.notes = this.form.notes;

                        const res = await fetch(`/auth/companies/${companyId}/projects`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'same-origin',
                            body: JSON.stringify(payload)
                        });

                        if (!res.ok) {
                            const errorData = await res.json();
                            throw new Error(errorData.detail || 'Failed to create project');
                        }

                        const data = await res.json();

                        // Redirect to project detail
                        window.location.href = `/portal/project-detail.html?id=${data.id}`;
                    } catch (err) {
                        console.error('Error creating project:', err);
                        this.error = err.message || 'Failed to create project';
                        this.submitting = false;
                    }
                },

                extractCompanyFromMemberships() {
                    if (this.user.companies && this.user.companies.length > 0) {
                        return this.user.companies[0].id;
                    }
                    return null;
                },

                async logout() {
                    try {
                        await fetch('/auth/logout', {
                            method: 'POST',
                            credentials: 'same-origin'
                        });
                    } finally {
                        window.location.href = '/auth/login';
                    }
                }
            };
        }
    </script>

</body>

</html>
