<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div x-data="portalApp()" x-init="init()">

        <!-- Header -->
        <header class="bg-white shadow-sm">
            <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                <h1 class="text-lg font-semibold text-gray-800">Company Tools</h1>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <span x-text="'Logged in as ' + user.display_name"></span>
                    <a x-show="user.is_admin" href="/admin" class="text-blue-600 hover:underline">Admin</a>
                    <button @click="showSettings = !showSettings" class="text-gray-400 hover:text-gray-600"
                        title="Settings">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                    <button @click="logout()" class="text-red-600 hover:underline">Logout</button>
                </div>
            </div>
        </header>

        <!-- Loading -->
        <div x-show="loading" class="text-center mt-20 text-gray-500">Loading…</div>

        <!-- App Cards -->
        <main x-show="!loading" class="max-w-4xl mx-auto px-6 py-10">
            <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                <template x-for="app in user.apps" :key="app.id">
                    <a :href="app.route_prefix"
                        class="block bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md hover:border-blue-300 transition">
                        <h2 class="text-lg font-semibold text-gray-800" x-text="app.name"></h2>
                        <p class="mt-1 text-sm text-gray-500" x-text="app.description"></p>
                    </a>
                </template>
            </div>

            <p x-show="!loading && user.apps.length === 0" class="text-center text-gray-400 mt-10">No apps available.
                Contact an admin for access.</p>

            <!-- Company Settings link (company admins only) -->
            <div x-show="showSettings && user.is_admin" x-transition
                class="mt-10 max-w-sm mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-800">Company Settings</p>
                    <p class="text-xs text-gray-500">Edit company name, timezone, and contact info</p>
                </div>
                <a :href="'/portal/company-settings.html' + (companyId ? '?company=' + companyId : '')"
                    class="text-sm text-blue-600 hover:underline">Open →</a>
            </div>

            <!-- Set Password -->
            <div x-show="showSettings" x-transition
                class="mt-4 max-w-sm mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 class="text-base font-semibold text-gray-800 mb-1">Password Login</h3>
                <p class="text-sm text-gray-500 mb-4">Set a password so you can log in as
                    <strong x-text="user.display_name"></strong> instead of using an access code.
                </p>
                <form @submit.prevent="setPassword">
                    <input type="password" x-show="needsCurrent" x-model="currentPassword"
                        placeholder="Current password" autocomplete="current-password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        :disabled="pwLoading" />
                    <input type="password" x-model="newPassword" placeholder="New password (min 8 chars)"
                        autocomplete="new-password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        :disabled="pwLoading" />
                    <button type="submit"
                        class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 rounded-lg transition disabled:opacity-50"
                        :disabled="pwLoading || newPassword.length < 8">
                        <span x-show="!pwLoading" x-text="pwSuccess ? '✓ Password saved' : 'Set Password'"></span>
                        <span x-show="pwLoading">Saving…</span>
                    </button>
                </form>
                <p x-show="pwError" x-text="pwError" class="mt-2 text-red-600 text-xs"></p>
            </div>
        </main>
    </div>

    <script>
        function portalApp() {
            return {
                loading: true,
                user: { display_name: '', is_admin: false, apps: [] },
                companyId: '',
                showSettings: false,
                newPassword: '',
                currentPassword: '',
                needsCurrent: false,
                pwLoading: false,
                pwError: '',
                pwSuccess: false,

                async init() {
                    try {
                        const res = await fetch('/auth/me', { credentials: 'same-origin' });
                        if (!res.ok) { window.location.href = '/auth/login'; return; }
                        this.user = await res.json();
                        const urlCompany = new URLSearchParams(window.location.search).get('company');
                        this.companyId = urlCompany
                            || this.user.company_id
                            || (this.user.companies && this.user.companies.length > 0
                                ? this.user.companies[0].id
                                : '');
                    } catch {
                        window.location.href = '/auth/login';
                    } finally {
                        this.loading = false;
                    }
                },

                async logout() {
                    await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
                    window.location.href = '/auth/login';
                },

                async setPassword() {
                    this.pwError = '';
                    this.pwSuccess = false;
                    this.pwLoading = true;
                    const body = { password: this.newPassword };
                    if (this.needsCurrent) body.current_password = this.currentPassword;
                    try {
                        const res = await fetch('/auth/set-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'same-origin',
                            body: JSON.stringify(body),
                        });
                        if (res.ok) {
                            this.pwSuccess = true;
                            this.newPassword = '';
                            this.currentPassword = '';
                            this.needsCurrent = false;
                            return;
                        }
                        const data = await res.json();
                        if (res.status === 400 && (data.detail || '').includes('Current password')) {
                            this.needsCurrent = true;
                            this.pwError = 'Enter your current password to change it.';
                        } else if (res.status === 401) {
                            this.pwError = 'Current password is incorrect.';
                        } else {
                            this.pwError = data.detail || 'Failed to set password';
                        }
                    } catch {
                        this.pwError = 'Network error — try again';
                    } finally {
                        this.pwLoading = false;
                    }
                },
            };
        }
    </script>
</body>

</html>
