# Nginx site config for Tools platform

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name SW3P.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SW3P.pro;

    # Certbot will manage these paths after: certbot --nginx -d SW3P.pro
    ssl_certificate     /etc/letsencrypt/live/SW3P.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SW3P.pro/privkey.pem;

    # ── Security headers ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Portal frontend (static HTML) ────────────────────────────────
    location = / {
        alias /opt/tools/repo/web/frontend/portal/;
        try_files /index.html =404;
    }

    location = /auth/login {
        alias /opt/tools/repo/web/frontend/portal/;
        try_files /login.html =404;
    }

    location = /admin {
        alias /opt/tools/repo/web/frontend/portal/;
        try_files /admin.html =404;
    }

    # ── Auth API → port 8001 ─────────────────────────────────────────
    location /auth/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SWPPP frontend (static HTML) ─────────────────────────────────
    location /swppp/ {
        alias /opt/tools/repo/web/frontend/swppp/;
        try_files $uri /index.html =404;
    }

    # ── SWPPP API → port 8002 ────────────────────────────────────────
    location /swppp/api/ {        client_max_body_size 6m;        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PDF generation can take a while
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # ── Deny everything else ─────────────────────────────────────────
    location / {
        return 404;
    }
}
