description: "ODOT Clean Water Inspection Form - AutoFill Mapping"

fields:
  job_piece:
    label: "Job Piece"
    pdf_field_name: "Job Piece"
  project_number:
    label: "Project Number"
    pdf_field_name: "Project Number"
  contract_id:
    label: "Contract ID"
    pdf_field_name: "Contract ID"
  location_description_1:
    label: "Location Description"
    pdf_field_name: "Location Description"
  location_description_2:
    label: "Location Description_2"
    pdf_field_name: "Location Description_2"
  re_odot_contact_1:
    label: "RE andor ODOT Contact"
    pdf_field_name: "RE andor ODOT Contact"
  re_odot_contact_2:
    label: "RE andor ODOT Contact_2"
    pdf_field_name: "RE andor ODOT Contact_2"
  inspection_type:
    label: "Type of Inspection"
    pdf_field_name: "Type of Inspection"
  inspected_by:
    label: "Inspected by"
    pdf_field_name: "Inspected by"
  reviewed_by:
    label: "Reviewed by"
    pdf_field_name: "Reviewed by"

date_fields:
  - label: "Date"
    pdf_field_name: "Date"

checkboxes:

  Erosion_Minimization:
    notes_field: "Notes1"
    pdf_fields:
      - { text: "BMPs are in place to minimize erosion?", allow_na: false }
      - { text: "Areas of work are delineated and steep slope disturbance is minimized?", allow_na: true }
      - { text: "Soils are stabilized where work has stopped for 14 days?", allow_na: false }
      - { text: "Conveyance channels are in place to route water around unstabilized areas?", allow_na: true }
      - { text: "Pipe Outlets have energy dissipation if connected to surface water?", allow_na: true }
      - { text: "BMPs discharge to vegetated areas?", allow_na: false }

  Sediment_Discharge_Minimization:
    notes_field: "Notes2"
    pdf_fields:
      - { text: "Effective sediment control practices used?", allow_na: false }
      - { text: "Dust prevention practices used?", allow_na: false }
      - { text: "Erosion and sediment controls in place prior to soil disturbing activities?", allow_na: true }
      - { text: "Perimeter control BMPs used on downgradient perimeters and upgradient of bufferzones?", allow_na: false }
      - { text: "Sediment control devices reinstalled if they’ve been adjusted for short-term work?", allow_na: true }
      - { text: "All storm drain inlets are protected?", allow_na: true }
      - { text: "Soil stockpiles have sediment controls and are not in conveyances or natural bufferzones?", allow_na: true }
      - { text: "Effective vehicle tracking BMPs used?", allow_na: true }
      - { text: "50 ft (100 ft in sensitive water) buffer preserved or redundant controls in place if site is within 50 ft of or drains to surface water?", allow_na: true }

  BMP_Maintenance:
    notes_field: "Notes3"
    pdf_fields:
      - { text: "Are all perimeter control BMPs maintained, functioning, and properly installed?", allow_na: false }
      - { text: "Sediment in sediment control BMPs is at less than 1/2 the device height?", allow_na: false }
      - { text: "Surface waters and discharge points are free of erosion and sediment?", allow_na: false }
      - { text: "Paved surfaces on or adjacent to site are free of tracked sediment?", allow_na: true }

  Solid_And_Hazardous_Waste:
    notes_field: "Notes4"
    pdf_fields:
      - { text: "Building products and chemicals (pesticides, herbicides, fertilizer, etc.) are covered?", allow_na: true }
      - { text: "Solid and hazardous waste is stored and disposed of properly?", allow_na: true }
      - { text: "Portable toilets are positioned properly?", allow_na: true }
      - { text: "Vehicle fueling in a contained area?", allow_na: true }
      - { text: "All material handling and storage areas reasonably clean and free of spills, leaks, and other harmful materials?", allow_na: false }
      - { text: "Dumpsters have a lid or cover for use during rain events or inactivity?", allow_na: true }
      - { text: "Site is free of floatables and litter?", allow_na: false }
      - { text: "Concrete and other washout wastes are contained and washouts are properly identified?", allow_na: false }
      - { text: "Vehicle and equipment washing wastes not in contact with ground and no engine degreasing occurs on site?", allow_na: false }

  Documentation_And_SWPPP:
    notes_field: "Notes5"
    pdf_fields:
      - { text: "Notice is posted with permit number, contact information, project description and SWPPP location?", allow_na: false }
      - { text: "Was the SWPPP inspected on this visit?", allow_na: false }
      - { text: "Is the SWPPP up to date and implemented?", allow_na: false }
      - { text: "Employee training", allow_na: false }
      - { text: "Inspection documentation every 7 days or within 24 hours of half in rain", allow_na: false }
      - { text: "Changes to site are noted and Erosion Control plan sheets included", allow_na: false }
      - { text: "Site conditions are documented accurately", allow_na: false }

  Stabilization:
    notes_field: "Notes6"
    pdf_fields:
      - { text: "Is this site ready for final stabilization?", allow_na: false }

  Additional_Information:
    notes_field: "Notes7"
    pdf_fields:
      - { text: "Temporary sediment basin used if 10 or more acres disturbed?", allow_na: true }
      - { text: "Dewatering activities present on site?", allow_na: false }
