<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div x-data="portalApp()" x-init="init()">

        <!-- Header -->
        <header class="bg-white shadow-sm">
            <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                <h1 class="text-lg font-semibold text-gray-800">Company Tools</h1>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <span x-text="'Logged in as ' + user.display_name"></span>
                    <a x-show="user.is_admin" href="/admin" class="text-blue-600 hover:underline">Admin</a>
                    <button @click="logout()" class="text-red-600 hover:underline">Logout</button>
                </div>
            </div>
        </header>

        <!-- Loading -->
        <div x-show="loading" class="text-center mt-20 text-gray-500">Loading…</div>

        <!-- App Cards -->
        <main x-show="!loading" class="max-w-4xl mx-auto px-6 py-10">
            <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                <template x-for="app in user.apps" :key="app.id">
                    <a :href="app.route_prefix"
                        class="block bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md hover:border-blue-300 transition">
                        <h2 class="text-lg font-semibold text-gray-800" x-text="app.name"></h2>
                        <p class="mt-1 text-sm text-gray-500" x-text="app.description"></p>
                    </a>
                </template>
            </div>

            <p x-show="!loading && user.apps.length === 0" class="text-center text-gray-400 mt-10">No apps available.
                Contact an admin for access.</p>

            <!-- Set Password -->
            <div class="mt-10 max-w-sm mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 class="text-base font-semibold text-gray-800 mb-1">Password Login</h3>
                <p class="text-sm text-gray-500 mb-4">Set a password so you can log in with your name instead of an access code.</p>
                <form @submit.prevent="setPassword">
                    <input type="password" x-model="newPassword" placeholder="New password (min 8 chars)"
                        autocomplete="new-password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        :disabled="pwLoading" />
                    <button type="submit"
                        class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 rounded-lg transition disabled:opacity-50"
                        :disabled="pwLoading || newPassword.length < 8">
                        <span x-show="!pwLoading" x-text="pwSuccess ? '✓ Password saved' : 'Set Password'"></span>
                        <span x-show="pwLoading">Saving…</span>
                    </button>
                </form>
                <p x-show="pwError" x-text="pwError" class="mt-2 text-red-600 text-xs"></p>
            </div>
        </main>
    </div>

    <script>
        function portalApp() {
            return {
                loading: true,
                user: { display_name: '', is_admin: false, apps: [] },
                newPassword: '',
                pwLoading: false,
                pwError: '',
                pwSuccess: false,

                async init() {
                    try {
                        const res = await fetch('/auth/me', { credentials: 'same-origin' });
                        if (!res.ok) { window.location.href = '/auth/login'; return; }
                        this.user = await res.json();
                    } catch {
                        window.location.href = '/auth/login';
                    } finally {
                        this.loading = false;
                    }
                },

                async logout() {
                    await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
                    window.location.href = '/auth/login';
                },

                async setPassword() {
                    this.pwError = '';
                    this.pwSuccess = false;
                    this.pwLoading = true;
                    try {
                        const res = await fetch('/auth/set-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'same-origin',
                            body: JSON.stringify({ password: this.newPassword }),
                        });
                        if (res.ok) {
                            this.pwSuccess = true;
                            this.newPassword = '';
                        } else {
                            const data = await res.json();
                            this.pwError = data.detail || 'Failed to set password';
                        }
                    } catch {
                        this.pwError = 'Network error — try again';
                    } finally {
                        this.pwLoading = false;
                    }
                },
            };
        }
    </script>
</body>

</html>
