<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Company Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div x-data="projectListApp()" x-init="init()">

        <!-- Header -->
        <header class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/" class="text-blue-600 hover:underline text-sm">← Back</a>
                    <h1 class="text-lg font-semibold text-gray-800">Projects</h1>
                    <a :href="user.is_platform_admin && companyId ? `/portal/dashboard.html?company=${companyId}` : '/portal/dashboard.html'"
                        class="text-sm text-blue-600 hover:underline">Dashboard</a>
                    <!-- Platform admin company picker -->
                    <template x-if="user.is_platform_admin && allCompanies.length > 0">
                        <select @change="switchCompany($event.target.value)"
                            class="text-sm border rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="" disabled :selected="!companyId">Select company…</option>
                            <template x-for="c in allCompanies" :key="c.id">
                                <option :value="c.id" :selected="c.id === companyId" x-text="c.display_name"></option>
                            </template>
                        </select>
                    </template>
                </div>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <span x-text="user.display_name"></span>
                    <a x-show="user.is_admin"
                        :href="'/portal/company-settings.html' + (companyId ? '?company=' + companyId : '')"
                        class="text-blue-600 hover:underline">Settings</a>
                    <button @click="logout()" class="text-red-600 hover:underline">Logout</button>
                </div>
            </div>
        </header>

        <!-- Loading -->
        <div x-show="loading" class="text-center mt-20 text-gray-500">Loading projects…</div>

        <!-- Error -->
        <div x-show="error" class="max-w-7xl mx-auto px-6 py-10">
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-red-700" x-text="error"></div>
        </div>

        <!-- Projects Table -->
        <main x-show="!loading && !error" class="max-w-7xl mx-auto px-6 py-10">

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-gray-800">Your Projects</h2>
                <a :href="user.is_platform_admin && companyId ? `/portal/project-new.html?company=${companyId}` : '/portal/project-new.html'"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                    + New Project
                </a>
            </div>

            <!-- Empty State -->
            <div x-show="projects.length === 0" class="bg-white rounded-xl border border-gray-200 p-12 text-center">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <h3 class="text-lg font-medium text-gray-700 mb-2">No projects yet</h3>
                <p class="text-sm text-gray-500 mb-6">Create your first project to get started with automated weekly
                    reports.</p>
                <a href="/portal/project-new.html"
                    class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">
                    Create Your First Project
                </a>
            </div>

            <!-- Projects Table -->
            <div x-show="projects.length > 0" class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Project Number
                                </th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Project Name
                                </th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Status
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                                    title="Auto-reporting health">
                                    Health
                                </th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Last Report
                                </th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Next Due
                                </th>
                                <th
                                    class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Actions
                                </th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <template x-for="project in projects" :key="project.id">
                                <tr class="hover:bg-gray-50 transition">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                        <span x-text="project.project_number"></span>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-700">
                                        <span x-text="project.project_name"></span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span
                                            class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium"
                                            :class="{
                                              'bg-green-100 text-green-700': project.status === 'active',
                                              'bg-yellow-100 text-yellow-700': project.status === 'setup_incomplete' || project.status === 'paused',
                                              'bg-gray-100 text-gray-700': project.status !== 'active' && project.status !== 'setup_incomplete' && project.status !== 'paused'
                                          }">
                                            <span class="w-1.5 h-1.5 rounded-full" :class="{
                                                  'bg-green-500': project.status === 'active',
                                                  'bg-yellow-500': project.status === 'setup_incomplete' || project.status === 'paused',
                                                  'bg-gray-500': project.status !== 'active' && project.status !== 'setup_incomplete' && project.status !== 'paused'
                                              }"></span>
                                            <span x-text="formatStatus(project.status)"></span>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span :title="healthDotTitle(project)">
                                            <span class="inline-block w-3 h-3 rounded-full"
                                                :class="healthDotClass(project)"></span>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                        <span x-text="formatDate(project.last_successful_run_at)"></span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                        <span x-text="calculateNextDue(project)"></span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                        <a :href="'/portal/project-detail.html?id=' + project.id + (companyId && user.is_platform_admin ? '&company=' + companyId : '')"
                                            class="text-blue-600 hover:text-blue-700 font-medium">
                                            View →
                                        </a>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        function projectListApp() {
            return {
                loading: true,
                error: '',
                user: { display_name: '', company_id: '', is_platform_admin: false },
                companyId: '',
                allCompanies: [],
                projects: [],

                async init() {
                    try {
                        const meRes = await fetch('/auth/me', { credentials: 'same-origin' });
                        if (!meRes.ok) {
                            window.location.href = '/auth/login';
                            return;
                        }
                        this.user = await meRes.json();

                        // URL param takes precedence; localStorage is convenience default only
                        const urlParams = new URLSearchParams(window.location.search);
                        const urlCompany = urlParams.get('company');
                        if (urlCompany) {
                            this.companyId = urlCompany;
                            localStorage.setItem('lastCompanyId', urlCompany);
                        } else {
                            this.companyId = this.user.company_id
                                || this.extractCompanyFromMemberships()
                                || localStorage.getItem('lastCompanyId');
                        }

                        // Platform admin: load company list for picker
                        if (this.user.is_platform_admin) {
                            const caRes = await fetch('/admin/companies', { credentials: 'same-origin' });
                            if (caRes.ok) {
                                const caData = await caRes.json();
                                this.allCompanies = caData.companies;
                            }
                            if (this.companyId && !urlCompany) {
                                history.replaceState(null, '', `?company=${this.companyId}`);
                            }
                        }

                        if (!this.companyId) {
                            this.error = this.user.is_platform_admin
                                ? 'Select a company above to view its projects.'
                                : 'No company membership found. Please contact your administrator.';
                            this.loading = false;
                            return;
                        }

                        const projectsRes = await fetch(`/auth/companies/${this.companyId}/projects`, {
                            credentials: 'same-origin'
                        });

                        if (!projectsRes.ok) {
                            throw new Error(`Failed to load projects: ${projectsRes.status}`);
                        }

                        const data = await projectsRes.json();
                        this.projects = data.projects || [];
                    } catch (err) {
                        console.error('Error loading projects:', err);
                        this.error = err.message || 'Failed to load projects';
                    } finally {
                        this.loading = false;
                    }
                },

                switchCompany(id) {
                    if (!id) return;
                    localStorage.setItem('lastCompanyId', id);
                    window.location.href = `?company=${id}`;
                },

                extractCompanyFromMemberships() {
                    const urlCompany = new URLSearchParams(window.location.search).get('company');
                    if (urlCompany) return urlCompany;
                    if (this.user.companies && this.user.companies.length > 0) {
                        return this.user.companies[0].id;
                    }
                    return null;
                },

                formatStatus(status) {
                    const statusMap = {
                        'active': 'Active',
                        'setup_incomplete': 'Setup Required',
                        'paused': 'Paused',
                        'archived': 'Archived'
                    };
                    return statusMap[status] || status;
                },

                formatDate(isoDate) {
                    if (!isoDate) return '—';
                    try {
                        const date = new Date(isoDate);
                        return date.toLocaleDateString('en-US', {
                            month: 'short',
                            day: 'numeric',
                            year: 'numeric'
                        });
                    } catch {
                        return '—';
                    }
                },

                calculateNextDue(project) {
                    if (!project.auto_weekly_enabled || project.status !== 'active') return '—';
                    const dow = project.schedule_day_of_week ?? 5; // 0=Mon … 6=Sun
                    const start = project.project_start_date ? new Date(project.project_start_date + 'T00:00:00') : null;
                    if (!start || isNaN(start)) return 'Scheduled';
                    // Convert our 0=Mon convention to JS 0=Sun convention
                    const jsDow = (dow + 1) % 7;
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    // Find next occurrence of jsDow >= today
                    const diff = (jsDow - today.getDay() + 7) % 7;
                    const next = new Date(today);
                    next.setDate(today.getDate() + (diff === 0 ? 7 : diff));
                    // If project end date has passed, show nothing
                    if (project.project_end_date) {
                        const end = new Date(project.project_end_date + 'T00:00:00');
                        if (next > end) return 'Ended';
                    }
                    return next.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                },

                healthDotClass(project) {
                    if (!project.auto_weekly_enabled) return 'bg-gray-300';
                    const s = project.last_run_status;
                    if (!s || !project.last_run_at) return 'bg-gray-300';
                    if (s === 'failed' || s === 'partial_failure') return 'bg-red-500';
                    if (s === 'skipped') return 'bg-yellow-400';
                    if (s === 'ok') {
                        const lastRun = new Date(project.last_run_at);
                        const msPerDay = 86400000;
                        const daysSince = (Date.now() - lastRun) / msPerDay;
                        return daysSince <= 8 ? 'bg-green-500' : 'bg-yellow-400';
                    }
                    return 'bg-gray-300';
                },

                healthDotTitle(project) {
                    if (!project.auto_weekly_enabled) return 'Auto-reporting disabled';
                    const s = project.last_run_status;
                    if (!s || !project.last_run_at) return 'No runs yet';
                    if (s === 'failed') return 'Last run failed';
                    if (s === 'partial_failure') return 'Last run partially failed';
                    if (s === 'skipped') return 'Last run skipped';
                    if (s === 'ok') return `Last run OK (${this.formatDate(project.last_run_at)})`;
                    return s;
                },

                async logout() {
                    try {
                        await fetch('/auth/logout', {
                            method: 'POST',
                            credentials: 'same-origin'
                        });
                    } finally {
                        window.location.href = '/auth/login';
                    }
                }
            };
        }
    </script>

</body>

</html>
