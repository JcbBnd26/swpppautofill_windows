# ── Rate limiting zones ──────────────────────────────────────────────────
# auth_login: password sign-in — 5 attempts per minute per IP
# auth_claim: invite code claim — 3 attempts per minute per IP
# 10m zone stores ~160,000 IP addresses; ample for this deployment.
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_claim:10m rate=3r/m;
limit_req_status 429;

# Nginx site config for Tools platform

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name sw3p.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sw3p.pro;

    # Certbot will manage these paths after: certbot --nginx -d sw3p.pro
    ssl_certificate     /etc/letsencrypt/live/sw3p.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sw3p.pro/privkey.pem;

    # ── Security headers ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Portal pages → auth service (server-side session check) ────
    # These are proxied to FastAPI so the session cookie is validated
    # before any HTML is sent to the browser.
    location = / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /auth/login is handled by the /auth/ prefix block below — no
    # separate exact-match needed.

    # ── Rate-limited auth endpoints ───────────────────────────────────
    location = /auth/signin {
        limit_req zone=auth_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/claim {
        limit_req zone=auth_claim burst=1 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth API → port 8001 ─────────────────────────────────────────
    location /auth/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SWPPP frontend (static HTML) ─────────────────────────────────
    location = /swppp { return 301 /swppp/; }
    location /swppp/ {
        alias /opt/tools/repo/web/frontend/swppp/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ── SWPPP API → port 8002 ────────────────────────────────────────
    location /swppp/api/ {        client_max_body_size 6m;        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PDF generation can take a while
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # ── Deny everything else ─────────────────────────────────────────
    location / {
        return 404;
    }
}
